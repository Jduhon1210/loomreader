<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Loom → SOP Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold: #E3A008; --gold-d: #C6890B; --gold-soft: #fbf3e0;
    --ink: #1b1b1b; --ink-2: #2f2f2f; --muted: #6f6b63;
    --line: #eae6dd; --bg: #faf9f6; --card: #ffffff; --warn: #b45309;
    --radius: 14px; --radius-pill: 999px;
    --shadow: 0 4px 24px rgba(30,25,10,.06);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* header — clean white bar, gold mark, like the brand site */
  header {
    background: var(--card); border-bottom: 1px solid var(--line);
    padding: 16px 28px; display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 20;
  }
  .logo {
    width: 40px; height: 40px; border-radius: 11px; flex: none;
    background: linear-gradient(145deg, #F3B71E, var(--gold-d));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 10px rgba(227,160,8,.35);
  }
  .logo svg { width: 22px; height: 22px; }
  .brand h1 { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: -0.02em; color: var(--ink); }
  .brand p { margin: 2px 0 0; font-size: 12.5px; color: var(--muted); }
  .brand .arrow { color: var(--gold); }

  .wrap { max-width: 920px; margin: 0 auto; padding: 32px 24px 24px; }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 22px; box-shadow: var(--shadow);
  }
  .row { display: flex; gap: 10px; }
  input[type="text"] {
    flex: 1; padding: 13px 16px; border: 1px solid var(--line); border-radius: 12px;
    font-size: 14px; font-family: inherit; color: var(--ink); background: #fff; transition: .15s;
  }
  input[type="text"]::placeholder { color: #a7a29a; }
  input[type="text"]:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(227,160,8,.16); }

  button.primary {
    background: var(--gold); color: #fff; border: 0; border-radius: var(--radius-pill);
    padding: 13px 26px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
    letter-spacing: .01em; transition: .15s; box-shadow: 0 3px 12px rgba(227,160,8,.30);
  }
  button.primary:hover:not(:disabled) { background: var(--gold-d); transform: translateY(-1px); box-shadow: 0 5px 16px rgba(227,160,8,.36); }
  button.primary:disabled { opacity: .5; cursor: not-allowed; box-shadow: none; }
  button.ghost {
    background: #fff; color: var(--ink); border: 1px solid var(--line); border-radius: var(--radius-pill);
    padding: 10px 18px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: .15s;
  }
  button.ghost:hover { border-color: var(--gold); color: var(--gold-d); }

  .opts { margin-top: 14px; }
  .opts textarea {
    width: 100%; min-height: 56px; padding: 11px 14px; border: 1px solid var(--line);
    border-radius: 12px; font-size: 13px; font-family: inherit; color: var(--ink); resize: vertical; transition: .15s;
  }
  .opts textarea:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(227,160,8,.16); }
  label.small { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; font-weight: 500; }

  #status { margin-top: 18px; display: none; }
  #status.show { display: block; }
  .bar { height: 8px; background: var(--line); border-radius: var(--radius-pill); overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, #F3B71E, var(--gold)); transition: width .3s; }
  .statusmsg { font-size: 13px; color: var(--muted); margin-top: 9px; }
  .err { color: #b91c1c; font-size: 13px; margin-top: 9px; white-space: pre-wrap; }

  #out { margin-top: 26px; display: none; }
  #out.show { display: block; }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
  .toolbar .hint { font-size: 12px; color: var(--muted); margin-right: auto; }

  /* SOP document */
  .sop {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 52px 58px; font-size: 13.5px; line-height: 1.55; box-shadow: var(--shadow);
  }
  .sop .doctitle {
    text-align: center; font-weight: 800; font-size: 15px; letter-spacing: .04em; text-transform: uppercase;
    color: var(--ink); border-bottom: 3px solid var(--gold); padding-bottom: 12px; margin-bottom: 22px;
  }
  .sec { border-top: 1px solid var(--line); padding: 13px 0; }
  .sec:first-of-type { border-top: 0; }
  .sec .lbl { font-weight: 700; font-size: 13.5px; margin-bottom: 5px; color: var(--ink); }
  .sec .val { white-space: pre-wrap; color: var(--ink-2); }
  .ed { outline: none; border-radius: 3px; transition: background .1s; }
  .ed:hover { background: var(--gold-soft); }
  .ed:focus { background: #fdf6e6; box-shadow: 0 0 0 2px rgba(227,160,8,.28); }
  .dates div { margin: 2px 0; }
  .dates b { display: inline-block; min-width: 130px; }
  ul.bare { list-style: none; padding-left: 0; margin: 4px 0; }
  ul.defs { padding-left: 0; list-style: none; margin: 4px 0; }
  ul.defs li { margin: 3px 0; }
  ol.proc { margin: 8px 0 0; padding-left: 22px; }
  ol.proc > li { margin: 0 0 15px; padding-left: 4px; }
  ol.proc > li::marker { color: var(--gold-d); font-weight: 700; }
  ol.proc ol.sub { list-style: lower-alpha; margin: 6px 0 0; padding-left: 22px; }
  ol.proc ol.sub > li { margin: 2px 0; }
  ol.proc ol.sub > li::marker { color: var(--muted); }
  .stepnote {
    margin: 8px 0 0; font-size: 12.5px; background: var(--gold-soft); border-left: 3px solid var(--gold);
    padding: 7px 12px; border-radius: 4px; color: #7a5606;
  }
  .shot { display: block; margin: 11px 0 2px; max-width: 100%; border: 1px solid var(--line); border-radius: 8px; }
  .hidden-media { position: absolute; left: -9999px; top: -9999px; }
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 34px; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="4" width="15" height="16" rx="2.5" fill="#fff"/>
      <path d="M9 9.2v5.6l5-2.8-5-2.8Z" fill="#C6890B"/>
      <rect x="18" y="8.5" width="4" height="7" rx="1.4" fill="#fff" opacity="0.9"/>
    </svg>
  </div>
  <div class="brand">
    <h1>Loom <span class="arrow">→</span> SOP Generator</h1>
    <p>Paste a Loom walkthrough — get a formatted Operations SOP with screenshots.</p>
  </div>
</header>

<div class="wrap">
  <div class="card">
    <div class="row">
      <input id="loomUrl" type="text" placeholder="https://www.loom.com/share/…" autocomplete="off" />
      <button id="go" class="primary">Generate SOP</button>
    </div>
    <div class="opts">
      <label class="small" for="ctx">Optional context for Claude (feature name, audience, anything to emphasize)</label>
      <textarea id="ctx" placeholder="e.g. This is the new automated invoice-approval flow for the Finance team."></textarea>
    </div>
    <div id="status">
      <div class="bar"><i id="barfill"></i></div>
      <div class="statusmsg" id="statusmsg">Starting…</div>
      <div class="err" id="errmsg"></div>
    </div>
  </div>

  <div id="out">
    <div class="toolbar">
      <span class="hint">Tip: click any text to edit it before downloading.</span>
      <button class="ghost" id="dlPdf">Download PDF</button>
      <button class="ghost" id="dlDoc">Download Word (.doc)</button>
    </div>
    <div class="sop" id="sop"></div>
  </div>
</div>

<footer>Frames are captured in your browser and sent to Claude only for this generation. Nothing is stored.</footer>

<video id="vid" class="hidden-media" crossorigin="anonymous" muted playsinline preload="auto"></video>
<canvas id="cap" class="hidden-media"></canvas>

<script>
const $ = (id) => document.getElementById(id);
const MAX_FRAMES = 32, FRAME_MAX_W = 1000, FRAME_QUALITY = 0.72;

// ---- Editable boilerplate defaults (your recurring template values) -------
function todayStr() { const d = new Date(); return (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear(); }
const DEFAULTS = {
  docTitle: 'Standard Operating Procedure (SOP) — Operations',
  sopNumberPrefix: 'OD0',
  effectiveDate: todayStr(),
  lastRevision: '',
  nextReview: '',
  roles: [
    'All Users — Create and place help desk tickets via email',
    'Dave Simpson — single point of contact for users of ERP for Atlas Carts',
    'Jon Duhon — single point of contact for Odoo',
  ],
  tools: ['Computer, Laptop'],
  compliance:
    'Follow the information requirements in the step-by-step procedure below. NOTE: Failure to comply could slow progress on addressing the request.',
  definitions: [
    { term: 'ERP', definition: 'Enterprise Resource Planning' },
    { term: 'Test Environment', definition: 'Offline instance of Odoo for trying solutions and confirming system functions appropriately' },
    { term: 'Live Environment', definition: 'aka “Production” — the official instance of ERP where all business is transacted' },
  ],
  revisionHistory: 'Initial Document release ' + todayStr(),
};

let lastSop = null, lastFrames = [];

function setStatus(pct, msg) { $('status').classList.add('show'); $('barfill').style.width = pct + '%'; $('statusmsg').textContent = msg; }
function setError(msg) { $('errmsg').textContent = msg; }
function reset() { $('errmsg').textContent = ''; $('out').classList.remove('show'); setStatus(0, 'Starting…'); }

async function resolveLoom(input) {
  const r = await fetch('/api/loom?id=' + encodeURIComponent(input));
  const data = await r.json();
  if (!r.ok) throw new Error(data.error + (data.detail ? ' (' + data.detail + ')' : ''));
  return data; // { type: 'mp4'|'hls', url, transcript }
}

// ---- video/stream loading ----
function loadMp4(url) {
  return new Promise((resolve, reject) => {
    const vid = $('vid');
    vid.src = '/api/proxy?url=' + encodeURIComponent(url);
    vid.onloadedmetadata = () => resolve();
    vid.onerror = () => reject(new Error('Could not load the video for frame capture.'));
  });
}
function cleanupHls() { if (window._hls) { try { window._hls.destroy(); } catch (e) {} window._hls = null; } }
function loadHls(url) {
  return new Promise((resolve, reject) => {
    const vid = $('vid');
    // Loom signs the whole HLS path with ONE query string; it must be appended to every child
    // request (sub-playlists + .ts segments). Only hls.js can do that (via a custom loader),
    // so PREFER hls.js. Native HLS (Safari) can't re-sign child requests, so it's a last resort.
    const qi = url.indexOf('?'), qs = qi >= 0 ? url.slice(qi + 1) : '';

    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
      class LoomLoader extends Hls.DefaultConfig.loader {
        load(ctx, cfg, cb) {
          if (qs && ctx.url && !/[?&](Policy|Signature)=/.test(ctx.url)) {
            ctx.url += (ctx.url.indexOf('?') >= 0 ? '&' : '?') + qs;
          }
          super.load(ctx, cfg, cb);
        }
      }
      const hls = new Hls({ loader: LoomLoader, startLevel: 0, capLevelToPlayerSize: false });
      window._hls = hls;
      let done = false;
      hls.on(Hls.Events.MANIFEST_PARSED, () => { try { hls.currentLevel = 0; } catch (e) {} });
      hls.on(Hls.Events.LEVEL_LOADED, () => { if (!done) { done = true; resolve(); } });
      hls.on(Hls.Events.ERROR, (e, data) => { if (data && data.fatal && !done) { done = true; reject(new Error('Streaming error: ' + (data.details || data.type))); } });
      hls.loadSource(url);
      hls.attachMedia(vid);
      return;
    }

    // Fallback: native HLS (mainly older Safari without MSE). May fail on signed Loom streams.
    if (vid.canPlayType('application/vnd.apple.mpegurl')) {
      vid.src = url;
      vid.onloadedmetadata = () => resolve();
      vid.onerror = () => reject(new Error('Could not load the streaming video.'));
      return;
    }
    reject(new Error('This browser cannot read the streaming video. Try Chrome or Safari.'));
  });
}

async function captureFrames(source) {
  const vid = $('vid'), cap = $('cap'), ctx = cap.getContext('2d');
  if (source.type === 'hls') await loadHls(source.url);
  else await loadMp4(source.url);

  // wait for a readable duration (HLS needs a beat after the level loads)
  let tries = 0;
  while ((!isFinite(vid.duration) || vid.duration <= 0) && tries++ < 120) await new Promise((r) => setTimeout(r, 50));
  const dur = vid.duration;
  if (!isFinite(dur) || dur <= 0) { cleanupHls(); throw new Error('Video has no readable duration.'); }

  const count = Math.min(MAX_FRAMES, Math.max(6, Math.round(dur / 4)));
  const interval = dur / (count + 1);
  const times = [];
  for (let i = 1; i <= count; i++) times.push(+(interval * i).toFixed(2));

  const frames = []; let idx = 0;
  const settle = source.type === 'hls' ? 140 : 0; // let the decoded frame paint after a stream seek
  const seekTo = (t) => new Promise((res) => {
    const on = () => { vid.removeEventListener('seeked', on); res(); };
    vid.addEventListener('seeked', on); vid.currentTime = t;
  });

  try {
    for (const t of times) {
      await seekTo(t);
      if (settle) await new Promise((r) => setTimeout(r, settle));
      const scale = Math.min(1, FRAME_MAX_W / (vid.videoWidth || FRAME_MAX_W));
      cap.width = Math.round((vid.videoWidth || FRAME_MAX_W) * scale);
      cap.height = Math.round((vid.videoHeight || 562) * scale);
      ctx.drawImage(vid, 0, 0, cap.width, cap.height);
      frames.push({ index: idx, t, dataUrl: cap.toDataURL('image/jpeg', FRAME_QUALITY) });
      idx++;
      setStatus(20 + Math.round((idx / times.length) * 45), `Capturing frames… ${idx}/${times.length}`);
    }
  } finally { cleanupHls(); }
  return frames;
}

async function generate(frames, transcript, context) {
  const r = await fetch('/api/generate', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ frames, transcript, context }),
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error + (data.detail ? '\n' + (typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail)) : ''));
  return data.sop;
}

function frameSrc(i) { const f = lastFrames.find((x) => x.index === i); return f ? f.dataUrl : null; }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
function ed(s) { return `<span class="ed" contenteditable="true">${esc(s)}</span>`; }
function edBlock(s) { return `<div class="ed" contenteditable="true">${esc(s)}</div>`; }
function section(n, label, innerHtml) { return `<div class="sec"><div class="lbl">${n}. ${esc(label)}</div><div class="val">${innerHtml}</div></div>`; }

function renderSop(sop) {
  const defs = [...DEFAULTS.definitions, ...((sop.definitions) || [])];
  let h = '';
  h += `<div class="doctitle">${ed(DEFAULTS.docTitle)}</div>`;
  h += section(1, 'SOP Title', ed(sop.title || ''));
  h += section(2, 'SOP Number', ed(DEFAULTS.sopNumberPrefix + '__'));
  h += section(3, 'Effective Date / Revision Date',
    `<div class="dates"><div><b>Effective Date:</b> ${ed(DEFAULTS.effectiveDate)}</div>` +
    `<div><b>Last Revision:</b> ${ed(DEFAULTS.lastRevision || ' ')}</div>` +
    `<div><b>Next Review Date:</b> ${ed(DEFAULTS.nextReview || ' ')}</div></div>`);
  h += section(4, 'Purpose', edBlock(sop.purpose || ''));
  h += section(5, 'Scope', edBlock(sop.scope || ''));

  let defHtml = '<ul class="defs">';
  defs.forEach((d) => { defHtml += `<li>${ed(d.term)} – ${ed(d.definition)}</li>`; });
  defHtml += '</ul>';
  h += section(6, 'Definitions & Key Terms', defHtml);

  let rolesHtml = '<ul class="bare">';
  DEFAULTS.roles.forEach((r) => { rolesHtml += `<li>${ed(r)}</li>`; });
  rolesHtml += '</ul>';
  h += section(7, 'Roles & Responsibilities', rolesHtml);

  let toolsHtml = '<ul class="bare">';
  DEFAULTS.tools.forEach((t) => { toolsHtml += `<li>${ed(t)}</li>`; });
  toolsHtml += '</ul>';
  h += section(8, 'Required Tools, Materials, & Systems', toolsHtml);

  h += section(9, 'Compliance Requirements', edBlock(DEFAULTS.compliance));

  let proc = '<ol class="proc">';
  (sop.procedure || []).forEach((s) => {
    proc += `<li>${ed(s.text || '')}`;
    if (Array.isArray(s.substeps) && s.substeps.length) {
      proc += '<ol class="sub">';
      s.substeps.forEach((ss) => (proc += `<li>${ed(ss)}</li>`));
      proc += '</ol>';
    }
    if (Number.isInteger(s.screenshotFrame)) {
      const src = frameSrc(s.screenshotFrame);
      if (src) proc += `<img class="shot" src="${src}" alt="Step screenshot" />`;
    }
    if (s.note) proc += `<div class="stepnote">NOTE: ${ed(s.note)}</div>`;
    proc += '</li>';
  });
  proc += '</ol>';
  h += section(10, 'Procedure (Step-by-Step)', proc);

  h += `<div class="sec"><div class="lbl">Revision History</div><div class="val">${edBlock(DEFAULTS.revisionHistory)}</div></div>`;

  $('sop').innerHTML = h;
  $('out').classList.add('show');
}

// ---- main flow ----
$('go').addEventListener('click', async () => {
  const input = $('loomUrl').value.trim();
  if (!input) return;
  reset(); $('go').disabled = true;
  try {
    setStatus(5, 'Resolving Loom video…');
    const src = await resolveLoom(input); // { type, url, transcript }
    setStatus(20, src.type === 'hls' ? 'Loading stream for frame capture…' : 'Loading video for frame capture…');
    lastFrames = await captureFrames(src);
    setStatus(70, `Claude is analyzing ${lastFrames.length} frames and writing the SOP…`);
    lastSop = await generate(lastFrames, src.transcript || [], $('ctx').value.trim());
    setStatus(100, 'Done.');
    renderSop(lastSop);
    setTimeout(() => $('status').classList.remove('show'), 800);
  } catch (e) {
    setError(e.message || String(e)); setStatus(0, 'Failed.');
  } finally { $('go').disabled = false; }
});

// ---- downloads (read live DOM so inline edits are captured) ----
function docName() { return (lastSop?.title || 'SOP').replace(/[^\w\- ]+/g, '').slice(0, 60).trim() || 'SOP'; }

$('dlPdf').addEventListener('click', () => {
  html2pdf().set({
    margin: [12, 12, 14, 12], filename: docName() + '.pdf',
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['css', 'avoid-all'] },
  }).from($('sop')).save();
});

$('dlDoc').addEventListener('click', () => {
  // Word ignores CSS max-width on images and renders them at full pixel size (up to 1000px wide),
  // which overflows the page and clips the right edge. Force an explicit display width via the
  // width attribute (which Word honors) so screenshots fit inside the page margins.
  const sopHtml = $('sop').innerHTML.replace(
    /<img class="shot"/g,
    '<img width="560" style="width:560px;height:auto;" class="shot"'
  );
  const html =
    '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">' +
    '<head><meta charset="utf-8"><title>' + esc(docName()) + '</title>' +
    '<style>body{font-family:Calibri,Arial,sans-serif;font-size:11pt;}' +
    '.doctitle{text-align:center;font-weight:bold;text-transform:uppercase;border-bottom:2px solid #C6890B;padding-bottom:8px;margin-bottom:14px;}' +
    '.lbl{font-weight:bold;margin-top:10px;}img.shot{width:560px;height:auto;max-width:560px;}ol.sub{list-style:lower-alpha;}' +
    '.stepnote{background:#fbf3e0;border-left:3px solid #E3A008;padding:5px 8px;}</style></head><body>' +
    sopHtml + '</body></html>';
  const blob = new Blob(['﻿', html], { type: 'application/msword' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = docName() + '.doc'; a.click();
  URL.revokeObjectURL(a.href);
});
</script>
</body>
</html>
